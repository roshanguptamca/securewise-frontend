# ─────────────────────────────────────────────────────────────────────────────
# SecureWise Frontend — CI workflow
# Runs on every push to feature/* / fix/* / main and on every Pull Request.
#
# Jobs:
#   typecheck  → tsc --noEmit
#   lint       → oxlint
#   test       → vitest with coverage ≥ 80% (components + api layer)
#   build      → vite build (verifies bundle produces no errors)
# ─────────────────────────────────────────────────────────────────────────────
name: SecureWise Frontend CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
      - "feat/**"
  pull_request:
    branches:
      - main
      - "feature/**"

concurrency:
  group: sw-frontend-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  # ── 1. TypeScript type-check ──────────────────────────────────────────────
  typecheck:
    name: TypeScript check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript — type check
        run: npm run typecheck

  # ── 2. Lint ───────────────────────────────────────────────────────────────
  lint:
    name: Lint (oxlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: oxlint — lint check
        run: npm run lint

  # ── 3. Tests + Coverage ───────────────────────────────────────────────────
  test:
    name: Tests (vitest · coverage ≥ 80%)
    runs-on: ubuntu-latest
    needs: [typecheck, lint]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sw-frontend-coverage
          path: coverage/

  # ── 4. Build check ────────────────────────────────────────────────────────
  build:
    name: Build (vite)
    runs-on: ubuntu-latest
    needs: test
    env:
      VITE_API_BASE_URL: https://api.guidewisey.com

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sw-frontend-dist
          path: dist/
          retention-days: 7
